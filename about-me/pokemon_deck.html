<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8"/>
        <meta name="description" content="Discover Pokémon Trading Card Game decks made by Pranav Thangakumar and friends!"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="../main.css"/>
        <link rel="stylesheet" href="pokemon_deck.css"/>
        <script src="pokemon_deck.js" defer></script>
        <title>Pranav's Pokédecks</title>
    </head>

    <body>
        <header>
            <h1>Pranav's Pokédecks</h1>
            <div id="links">
                <a href="../index.html">Homepage</a>
                <div class="dropdown">
                    <a href="about-me.html">About Me ▾</a>
                    <div class="dropdown-menu">
                        <a href="booklist.html">Booklist</a>
                        <a href="pokemon_deck.html">Pokédecks</a>
                    </div>
                </div>
                <a href="../contact-page.html">Contact Me</a>
                <a href="../blog/blog-homepage.html">Blogpage</a>
            </div>
        </header>

        <div class="container">

            <!-- Tab bar — buttons are injected by pokemon_deck.js -->
            <div class="deck-tabs-wrapper">
                <div id="deck-tabs"></div>
            </div>

            <!-- All card sections are rendered here by pokemon_deck.js -->
            <div id="deck-content"></div>

            <!-- Add-deck form — shown when + tab is clicked.
                 Put your form inputs inside this div. -->
            <div id="deck-form">
                <h2>Add a New Deck</h2>
                <!-- YOUR FORM GOES HERE -->
                <form action="https://formspree.io/f/mlgagvyl" method="post">
                    <input type="text" name="creator" class="form-item" placeholder="Name of the deck creator..." required>
                    <br><br>

                    <input type="text" name="deck-name" class="form-item" placeholder="Name of the deck..." required>
                    <br><br>

                    <input type="text" name="deck-format" class="form-item" placeholder="Deck format..." required>
                    <br><br>

                    <textarea name="card-list" class="form-item" placeholder="Cards in the deck (Card Name - Set Name [ex. Eevee - Prismatic Evolutions])" required></textarea>
                    <br><br>

                    <input type="email" name="email" class="form-item" placeholder="Your email... (response purposes only)" required>
                    <br><br>

                    <button type="submit">Submit</button>
                </form>
            </div>

        </div>
    </body>

</html>
