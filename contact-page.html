        <div class="container">
            <h2>Contact Me!</h2>
            <div class="contact-layout">

                <div class="about-card">
                    <img src="images/profile_pic.svg" alt="Pranav's profile picture">
                    <h3>Pranav Thangakumar</h3>
                    <p>I'm Pranav, a curious and passionate learner based in Washington.</p>
                    <hr>
                    <div class="facts">
                        <p>♟️ Chess competitor</p>
                        <p>🤖 FLL / VEX Roboticist</p>
                        <p>📚 Avid reader</p>
                        <p>🎮 Pokémon fan</p>
                    </div>
                        
                    <hr>
                    <div class="social-links">
                        <a href="https://www.chess.com/member/rampaging_king" target="_blank">Chess.com</a>
                        <a href="https://lichess.org/@/SupersonicChessKing" target="_blank">Lichess</a>
                        <a href="https://github.com/pranavthanga" target="_blank">GitHub</a>
                    </div>
                </div>

                <form action="https://formspree.io/f/xreoavgq" method="post">
                    <input type="text" name="name" class="form-item" placeholder="Your name..." required>
                    <br><br>

                    <select name="reason for contact" class="form-item" required>
                        <option value="" disabled selected>Select a reason...</option>
                        <option value="Business">Business</option>
                        <option value="Personal">Personal</option>
                        <option value="Feedback">Feedback</option>
                        <option value="Other">Other</option>
                    </select>
                    <br><br>

                    <textarea name="message" class="form-item" placeholder="Your message..." required></textarea>
                    <br><br>

                    <input type="email" name="email" class="form-item" placeholder="Your email... (response purposes only)" required>
                    <br><br>

                    <button type="submit">Submit</button>
                </form>

            </div>
        </div>

    </body>
